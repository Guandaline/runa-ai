[default]
app_name = "test-nala"
log_level = "debug" 
timeout = 10.0

# =================================
#               ai
# =================================

[default.ai.connections]
default_connection_name = "default_local"

[default.ai.connections.connections.default_local]
enabled = true
backend = "openai"  
default_model = "llama3.2:1b"
timeout = 120.0

[default.ai.connections.connections.default_local.provider]
backend = "openai"
base_url = "http://localhost:11434/v1"
api_key = "ollama" # Dummy key
organization_id = "org-local"


# =================================
#           AI AGENTS
# =================================

[default.ai.agents]
enabled = true
default_profile = "hr_assistant"

# The profile must be nested under .connections
[default.ai.agents.profiles.connections.hr_assistant]
name = "hr_assistant"
connection_name = "default_local" 
tools = [
    "get_remaining_vacation_days",
    "request_time_off",
    "get_company_policy",
]

[default.ai.agents.profiles.connections.hr_assistant.persistence]
enabled = true
backend = "kv"
kv_connection_name = "default_local"


# =================================
#           database
# =================================

[default.database]

# ------- kvstore -------

[default.database.kvstore]
default_connection_name = "default_local"

[default.database.kvstore.connections.default_local]
enabled = true
backend = "local"

[default.database.kvstore.connections.default_local.provider]
enabled = true
backend = "local"


[[default.database.kvstore.connections.default_local.wrappers]]
name = "default_ttl"
enabled = true
default_ttl_seconds = 3600

[[default.database.kvstore.connections.default_local.wrappers]]
name = "key_resolver"
enabled = true
namespace = "my-app"
static_prefix = "cache"

# =================================
#           performance
# =================================

[default.performance]
enabled = true

# =================================
#              cache
# =================================

[default.performance.cache]
_live_keys_config = { default_ttl_seconds = "performance.cache.default_ttl_seconds" }
enabled = true
get_user_by_id = "performance.cache.ttls.get_user_by_id"
list_products = "performance.cache.ttls.list_products"
default_ttl_seconds = 3600
kv_store_connection_name = "default_redis"

[default.performance.cache.ttls]
_live_keys_config = { get_user_details = "performance.cache.ttls.get_user_details" }
get_user_details = 300 

[default.performance.cache.fallback]
enabled = true

[[default.performance.cache.fallback.providers]]
enabled = true
provider = { backend = "local" } 

wrappers = [
  { name = "default_ttl", config = { default_ttl_seconds = 60 } },
  { name = "key_resolver", config = { namespace = "cache_in_memory" } }
]

# =================================
#           observability
# =================================

[default.observability]
enabled = true
exporter_enabled = true
exporter_port = 9100
tracing_enabled = true
otlp_endpoint = "http://localhost:4317"
sampling_rate = 1.0

[default.observability.logging]
_live_keys_config = { level = "observability.logging.level" }
level = "info"

[default.observability.metrics]
enabled = true
metrics_protection_enabled = true
allow_metrics_ips = ["127.0.0.1", "172.28.0.10"]
exporter_enabled = true
exporter_port = 9100
prometheus_enabled = true
prometheus_port = 9090

[default.observability.metrics.messaging]
enabled = true
track_consumer_factory = true


[default.resilience] 

# =================================
#              retry
# =================================

[default.resilience.retry]
_live_keys_config = { attempts = "resilience.retry.attempts", wait_max_seconds = "resilience.retry.wait_max_seconds" }
enabled = true

[default.resilience.default_policy]
attempts = 2
wait_min_seconds = 0.5

[default.resilience.retry.policies]
[default.resilience.policies.api_service]
attempts = 5
backoff = 2.0
[default.resilience.policies.payments]
attempts = 2
wait_min_seconds = 2.0

# =================================
#          rate limiter
# =================================

[default.resilience.rate_limiter]
enabled = true
backend = "limits"
_live_keys_config = { default_policy_limit = "resilience.rate_limiter.default_policy_limit" }
default_policy_limit = "100/minute"

[default.resilience.rate_limiter.limits]
backend = "limits"
strategy = "moving-window"
storage_uri = "redis://localhost:6379/0"
key_prefix = "nala:ratelimit"
default_policy_limit = "100/minute"
ai_default = "100/minute"
ai_premium = "1000/minute"

[default.resilience.rate_limiter.policies]
free = "10/minute"
pro = "100/minute"
internal = "nolimit"

# =================================
#           circuit breaker
# =================================

[default.resilience.circuit_breaker]
enabled = true                     
_live_keys_config = { default_fail_max = "resilience.circuit_breaker.default_fail_max", default_reset_timeout_sec = "resilience.circuit_breaker.default_reset_timeout_sec" }

default_fail_max = 5              
default_reset_timeout_sec = 30.0  

[default.resilience.circuit_breaker.storage]
backend = "redis"

[default.resilience.circuit_breaker.redis]
backend = "redis"
uri = "redis://localhost:6379/2" 

[default.resilience.circuit_breaker.circuits]

[default.resilience.circuit_breaker.circuits."my_service_x"]
fail_max = 2          
reset_timeout_sec = 10.0 

[default.resilience.circuit_breaker.circuits."__main__.decorated_async_control"] 
fail_max = 3
