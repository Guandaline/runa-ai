# Project Information
site_name: Teste Nala
site_description: >-
  Robust IDP for building resilient, observable,
  and scalable microservices in Python.
site_author: Valter Hugo Guandaline
site_url: https://test-nala.github.io/athomic/

# Repository
repo_name: test-nala/athomic
repo_url: https://github.com/test-nala/athomic
edit_uri: "" # Optional: link to edit pages in the repo

# Copyright
copyright: Copyright &copy; 2025 Valter Hugo Guandaline

# Theme Configuration
theme:
  name: material
  language: en
  palette:
    # Palette toggle for light vs dark mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.annotate
    - content.code.copy

# Plugins
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src] # Tell mkdocstrings to look for source code in the 'src' directory
          options:
            show_root_heading: yes
            show_source: false

